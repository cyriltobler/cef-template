name: Windows

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path build/Release/* -DestinationPath windows-x64.zip

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: windows-x64.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: windows-x64.zip
